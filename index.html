
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTEUP Result Analyzer | @rizwansoaib</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* === HIGH DOPAMINE UI/UX VARIABLES === */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.8);
            --accent-glow: 0 0 20px rgba(0, 229, 255, 0.6);
        }

        /* === ANIMATED MESH GRADIENT BACKGROUND === */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-main);
            background: linear-gradient(-45deg, #ff0055, #7a00ff, #00e5ff, #00ff88);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* === GLASSMORPHISM CONTAINER === */
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: var(--glass-shadow);
            transform: translateY(20px);
            animation: floatUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-sizing: border-box;
        }

        @keyframes floatUp {
            to { transform: translateY(0); opacity: 1; }
        }

        /* === TYPOGRAPHY & HEADER === */
        h2 {
            text-align: center;
            font-weight: 800;
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .dev-credit {
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            color: #00ffcc;
            margin-bottom: 2.5rem;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--glass-border);
            padding-bottom: 0.5rem;
        }

        /* === INPUTS & SATISFYING INTERACTIONS === */
        .form-group {
            margin-bottom: 1.5rem;
            animation: fadeIn 0.5s ease forwards;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="file"], select {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-sizing: border-box;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            background: #fff;
            color: #7a00ff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 1rem;
        }

        input[type="file"]:hover, select:hover, select:focus {
            background: rgba(0, 0, 0, 0.3);
            box-shadow: var(--accent-glow);
            border-color: rgba(255, 255, 255, 0.5);
        }

        select option {
            background: #1e1e2f;
            color: white;
        }

        /* === DOPAMINE BUTTON === */
        button {
            width: 100%;
            padding: 1.2rem;
            margin-top: 1rem;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: white;
            background: linear-gradient(90deg, #ff007f, #7a00ff);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 0, 127, 0.4);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            transition: left 0.5s;
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 25px rgba(255, 0, 127, 0.6);
        }

        button:hover::after {
            left: 150%;
        }

        button:active {
            transform: translateY(2px) scale(0.98);
        }

        /* === STAGGERED REWARD GRID === */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1.25rem;
            perspective: 1000px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem 1rem;
            text-align: center;
            transition: all 0.3s ease;
            opacity: 0;
            transform: rotateX(-20deg) translateY(20px);
        }

        .stat-card.animate {
            animation: cardPopIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes cardPopIn {
            to { opacity: 1; transform: rotateX(0) translateY(0); }
        }

        .stat-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px) scale(1.05) !important; /* Overrides animation */
            box-shadow: var(--accent-glow);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .stat-card h3 {
            margin: 0;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card p {
            margin: 0.5rem 0 0;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #00ffcc, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        /* Utility */
        .hidden { display: none !important; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === MOBILE RESPONSIVENESS === */
        @media (max-width: 600px) {
            .container { padding: 1.5rem; border-radius: 16px; }
            h2 { font-size: 1.5rem; }
            .results-grid { grid-template-columns: repeat(2, 1fr); }
            .stat-card p { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>BTEUP Data Analyzer</h2>
    <div class="dev-credit">Developed by @rizwansoaib</div>
    
    <div class="form-group">
        <label for="fileInput">1. Select .OUT Data File</label>
        <input type="file" id="fileInput" accept=".out,.txt,.html">
    </div>

    <div id="subjectSelection" class="form-group hidden">
        <label for="subjectSelect">2. Target Subject</label>
        <select id="subjectSelect">
            <option value="">-- Choose a Subject --</option>
        </select>
    </div>

    <button id="analyzeBtn" class="hidden">Run Analysis 🚀</button>

    <div id="resultsPanel" class="hidden">
        <h3 class="section-title">Performance Distribution</h3>
        <div class="results-grid" id="mainStats">
            <div class="stat-card">
                <h3>Total</h3>
                <p id="resTotal">0</p>
            </div>
            <div class="stat-card">
                <h3>Absent</h3>
                <p id="resAbsent">0</p>
            </div>
            <div class="stat-card">
                <h3>33% - 44%</h3>
                <p id="res33">0</p>
            </div>
            <div class="stat-card">
                <h3>45% - 59%</h3>
                <p id="res45">0</p>
            </div>
            <div class="stat-card">
                <h3>60% - 79%</h3>
                <p id="res60">0</p>
            </div>
            <div class="stat-card">
                <h3>80% - 100%</h3>
                <p id="res80">0</p>
            </div>
        </div>

        <h3 class="section-title">APAR Metrics</h3>
        <div class="results-grid" id="aparStats">
            <div class="stat-card">
                <h3>60% - 74%</h3>
                <p id="resApar60">0</p>
            </div>
            <div class="stat-card">
                <h3>75% & Above</h3>
                <p id="resApar75">0</p>
            </div>
        </div>
    </div>
</div>

<script>
    let fileLines = [];
    const fileInput = document.getElementById('fileInput');
    const subjectSelect = document.getElementById('subjectSelect');
    const subjectSelectionDiv = document.getElementById('subjectSelection');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultsPanel = document.getElementById('resultsPanel');
    const statCards = document.querySelectorAll('.stat-card');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // Reset UI for psychology effect (satisfying clear)
        resultsPanel.classList.add('hidden');
        statCards.forEach(card => card.classList.remove('animate'));

        const reader = new FileReader();
        reader.onload = function(event) {
            const content = event.target.result;
            fileLines = content.split('\n');
            extractSubjects(content);
        };
        reader.readAsText(file);
    });

    function extractSubjects(text) {
        const subjectSet = new Set();
        const regex = /(\d{6}\s+[A-Za-z&\-\(\) ][A-Za-z0-9&\-\(\) ]+?)(?=\s{2,}\d{2,3}\s)/g;
        
        let match;
        while ((match = regex.exec(text)) !== null) {
            subjectSet.add(match[1].trim());
        }

        subjectSelect.innerHTML = '<option value="">-- Dropdown to Select --</option>';
        const sortedSubjects = Array.from(subjectSet).sort();
        
        sortedSubjects.forEach(subj => {
            const option = document.createElement('option');
            option.value = subj;
            option.textContent = subj;
            subjectSelect.appendChild(option);
        });

        if (sortedSubjects.length > 0) {
            subjectSelectionDiv.classList.remove('hidden');
            analyzeBtn.classList.remove('hidden');
        } else {
            alert("⚠️ No subjects parsed. Check file structure.");
            subjectSelectionDiv.classList.add('hidden');
            analyzeBtn.classList.add('hidden');
        }
    }

    analyzeBtn.addEventListener('click', function() {
        const lookup = subjectSelect.value;
        if (!lookup) {
            alert("Please choose a subject to trigger the analysis.");
            return;
        }

        // Haptic feedback simulation for mobile
        if(navigator.vibrate) navigator.vibrate(50);

        let maxMarks = 50; 
        const marksList = [];

        fileLines.forEach(line => {
            const idx = line.indexOf(lookup);
            if (idx !== -1) {
                const remainder = line.substring(idx + lookup.length).trim();
                const parts = remainder.split(/\s+/);
                
                if (parts.length >= 2) {
                    maxMarks = parseInt(parts[0], 10);
                    let obtainedStr = "";

                    if (parts.length >= 3 && parts[2].includes('/')) {
                        obtainedStr = parts[1]; 
                    } else if (parts.length >= 3) {
                        obtainedStr = parts[2]; 
                    } else {
                        obtainedStr = parts[1]; 
                    }
                    marksList.push(obtainedStr);
                }
            }
        });

        calculateStats(marksList, maxMarks);
    });

    function calculateStats(marksList, maxMarks) {
        let num_abs = 0, num_33_44 = 0, num_45_59 = 0, num_60_79 = 0, num_80_100 = 0;
        let num_60_74 = 0, num_75 = 0;
        const absFlags = ['AA', 'MW', 'A7', 'A', 'A3'];

        marksList.forEach(markStr => {
            let finalMark = -1;
            if (absFlags.includes(markStr)) {
                finalMark = -1;
            } else if (markStr.includes('G-')) {
                finalMark = parseInt(markStr.split('G-')[0], 10);
            } else {
                finalMark = parseInt(markStr, 10);
            }
            if (isNaN(finalMark)) finalMark = -1; 

            if (finalMark === -1) {
                num_abs++;
            } else {
                if (finalMark >= Math.ceil(maxMarks * 0.33) && finalMark <= Math.floor(maxMarks * 0.44)) num_33_44++;
                else if (finalMark >= Math.ceil(maxMarks * 0.45) && finalMark <= Math.floor(maxMarks * 0.59)) num_45_59++;
                else if (finalMark >= Math.ceil(maxMarks * 0.60) && finalMark <= Math.floor(maxMarks * 0.79)) num_60_79++;
                else if (finalMark >= Math.ceil(maxMarks * 0.80) && finalMark <= Math.floor(maxMarks * 1.00)) num_80_100++;

                if (finalMark >= Math.ceil(maxMarks * 0.60) && finalMark <= Math.floor(maxMarks * 0.74)) num_60_74++;
                else if (finalMark >= Math.ceil(maxMarks * 0.75) && finalMark <= Math.floor(maxMarks * 1.00)) num_75++;
            }
        });

        // Update DOM Data
        document.getElementById('resTotal').textContent = marksList.length;
        document.getElementById('resAbsent').textContent = num_abs;
        document.getElementById('res33').textContent = num_33_44;
        document.getElementById('res45').textContent = num_45_59;
        document.getElementById('res60').textContent = num_60_79;
        document.getElementById('res80').textContent = num_80_100;
        document.getElementById('resApar60').textContent = num_60_74;
        document.getElementById('resApar75').textContent = num_75;

        // Trigger Psychological Staggered Animations
        resultsPanel.classList.remove('hidden');
        
        statCards.forEach((card, index) => {
            card.classList.remove('animate');
            void card.offsetWidth; // Force reflow to restart animation
            card.style.animationDelay = `${index * 0.08}s`;
            card.classList.add('animate');
        });
    }
</script>
</body>
</html>
